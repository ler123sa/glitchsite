<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — GlitchDLC</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="/">
      <span class="logo-mark"></span>
      Glitch<span>DLC</span>
    </a>
    <div class="nav-links">
      <a href="login.html" class="btn-nav">Вход</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="hero-grid"></div>
  <div class="hero-glow g1"></div>
  <div class="hero-glow g2"></div>

  <div class="auth-card fade-in">
    <h2>Создать аккаунт</h2>
    <p class="sub">Присоединяйся к GlitchDLC</p>

    <div class="msg error"   id="msg-error"></div>
    <div class="msg success" id="msg-ok"></div>

    <form id="reg-form" autocomplete="on">
      <div class="form-group">
        <label for="username">Никнейм</label>
        <input type="text" id="username" name="username" placeholder="Только буквы, цифры и _" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="example@mail.ru" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Минимум 6 символов" autocomplete="new-password" required />
      </div>
      <div class="form-group">
        <label for="password2">Повтори пароль</label>
        <input type="password" id="password2" name="password2" placeholder="••••••••" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Создать аккаунт</button>
    </form>

    <div class="auth-footer">
      Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  if (localStorage.getItem('gdlc_token')) {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('reg-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');

    const username  = document.getElementById('username').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if (password !== password2) {
      return showMsg('error', 'Пароли не совпадают');
    }

    btn.disabled = true;
    btn.textContent = 'Создаём аккаунт...';

    try {
      await api('/api/auth/register', 'POST', { username, email, password });
      showMsg('ok', 'Аккаунт создан, входим...');

      const data = await api('/api/auth/login', 'POST', { username, password });
      localStorage.setItem('gdlc_token', data.token);
      localStorage.setItem('gdlc_user',  JSON.stringify(data.user));
      setTimeout(() => window.location.href = 'dashboard.html', 700);
    } catch (err) {
      showMsg('error', err.message || 'Ошибка регистрации');
      btn.disabled = false;
      btn.textContent = 'Создать аккаунт';
    }
  });

  function showMsg(type, text) {
    const el = document.getElementById(type === 'ok' ? 'msg-ok' : 'msg-error');
    const other = document.getElementById(type === 'ok' ? 'msg-error' : 'msg-ok');
    other.style.display = 'none';
    el.textContent = text;
    el.style.display = 'flex';
  }
</script>
</body>
</html>
