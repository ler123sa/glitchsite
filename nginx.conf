server {
    listen       8080 default_server;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    charset utf-8;
    charset_types text/css text/plain text/javascript application/javascript application/json image/svg+xml;

    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # /  → index.html
    location = / {
        try_files /index.html =404;
    }

    # ── статика ─────────────────────────────────
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|map)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # ── чистые URL: /login → /login.html, /admin → /admin.html ──
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
