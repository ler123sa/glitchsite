<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Войти — GlitchDLC</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="/">
      <span class="logo-mark"></span>
      Glitch<span>DLC</span>
    </a>
    <div class="nav-links">
      <a href="/register" class="btn-nav">Регистрация</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="hero-grid"></div>
  <div class="hero-glow g1"></div>
  <div class="hero-glow g2"></div>

  <div class="auth-card fade-in">
    <h2>С возвращением</h2>
    <p class="sub">Войди в свой аккаунт GlitchDLC</p>

    <div class="msg error"   id="msg-error"></div>
    <div class="msg success" id="msg-ok"></div>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="username">Никнейм</label>
        <input type="text" id="username" name="username" placeholder="Твой никнейм" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Войти</button>
    </form>

    <div class="auth-footer">
      Нет аккаунта? <a href="/register">Создать</a>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
  if (localStorage.getItem('gdlc_token')) {
    window.location.href = '/dashboard';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Входим...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const data = await api('/api/auth/login', 'POST', { username, password });
      localStorage.setItem('gdlc_token', data.token);
      localStorage.setItem('gdlc_user',  JSON.stringify(data.user));
      showMsg('ok', 'Готово, перенаправляем...');
      setTimeout(() => window.location.href = '/dashboard', 600);
    } catch (err) {
      showMsg('error', err.message || 'Ошибка входа');
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  });

  function showMsg(type, text) {
    const el = document.getElementById(type === 'ok' ? 'msg-ok' : 'msg-error');
    const other = document.getElementById(type === 'ok' ? 'msg-error' : 'msg-ok');
    other.style.display = 'none';
    el.textContent = text;
    el.style.display = 'flex';
  }
</script>
</body>
</html>
